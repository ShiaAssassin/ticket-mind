spring:
  application:
    name: ticket-mind
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

server:
  port: ${SERVER_PORT:8080}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_MODEL:qwen-plus}
      temperature: ${OPENAI_TEMPERATURE:0.2}
    embedding-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-v2}  # 阿里云百炼嵌入模型
      timeout: 30s

ticket-mind:
  chat:
    history-limit: ${CHAT_HISTORY_LIMIT:10}
    short-memory-ttl-hours: ${CHAT_SHORT_MEMORY_TTL_HOURS:24}
  knowledge:
    top-k: ${RAG_TOP_K:4}
    chunk-size: ${KNOWLEDGE_CHUNK_SIZE:512}
    chunk-overlap: ${KNOWLEDGE_CHUNK_OVERLAP:64}
  chroma:
    enabled: ${CHROMA_ENABLED:true}
    base-url: ${CHROMA_BASE_URL:http://localhost:8000}
    knowledge-collection: ${CHROMA_COLLECTION:ticket-mind-knowledge}
    skill-collection: ${CHROMA_SKILL_COLLECTION:ticket-mind-skill}
    skill-root-path: ${CHROMA_SKILL_ROOT_PATH:ticket-mind-core/src/main/resources/skills}
    skill-watch-enabled: ${CHROMA_SKILL_WATCH_ENABLED:true}
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:false}
    knowledge-upload-exchange: ${RABBITMQ_KNOWLEDGE_UPLOAD_EXCHANGE:ticket-mind.knowledge.exchange}
    knowledge-upload-queue: ${RABBITMQ_KNOWLEDGE_UPLOAD_QUEUE:ticket-mind.knowledge.uploaded.queue}
    knowledge-upload-routing-key: ${RABBITMQ_KNOWLEDGE_UPLOAD_ROUTING_KEY:knowledge.uploaded}
    todo-list-archive-exchange: ${RABBITMQ_TODO_LIST_ARCHIVE_EXCHANGE:ticket-mind.todo-list.exchange}
    todo-list-archive-queue: ${RABBITMQ_TODO_LIST_ARCHIVE_QUEUE:ticket-mind.todo-list.archived.queue}
    todo-list-archive-routing-key: ${RABBITMQ_TODO_LIST_ARCHIVE_ROUTING_KEY:todo-list.archived}
  todo-list:
    active-ttl-hours: ${TODO_LIST_ACTIVE_TTL_HOURS:24}
    temp-archive-directory: ${TODO_LIST_TEMP_ARCHIVE_DIRECTORY:tmp/todo-list-archive}
