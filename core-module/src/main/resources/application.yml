spring:
  application:
    name: ticket-mind
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:ticket-mind}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:2h}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:14d}
  permit:
    matchers:
      - pattern: /
        method: GET
      - pattern: /auth/login
        method: POST
      - pattern: /auth/refresh
        method: POST
      - pattern: /favicon.*
        method: GET
      - pattern: /actuator/health
        method: GET
    ips: ${SECURITY_PERMIT_IPS:}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_MODEL:qwen-plus}
      temperature: ${OPENAI_TEMPERATURE:0.2}
    streaming-chat-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_MODEL:qwen-plus}
      temperature: ${OPENAI_TEMPERATURE:0.2}
    embedding-model:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-v2}  # 阿里云百炼嵌入模型
      timeout: 30s

ticket-mind:
  chat:
    history-limit: ${CHAT_HISTORY_LIMIT:10}
    short-memory-ttl-hours: ${CHAT_SHORT_MEMORY_TTL_HOURS:24}
  context-compact:
    message-threshold: ${CONTEXT_COMPACT_MESSAGE_THRESHOLD:50}
    head-message-count: ${CONTEXT_COMPACT_HEAD_MESSAGE_COUNT:3}
    recent-tool-result-count: ${CONTEXT_COMPACT_RECENT_TOOL_RESULT_COUNT:3}
    tool-result-max-chars: ${CONTEXT_COMPACT_TOOL_RESULT_MAX_CHARS:8000}
    token-threshold: ${CONTEXT_COMPACT_TOKEN_THRESHOLD:6000}
    emergency-target-ratio: ${CONTEXT_COMPACT_EMERGENCY_TARGET_RATIO:0.8}
    local-store-directory: ${CONTEXT_COMPACT_LOCAL_STORE_DIRECTORY:context-compact/tool-results}
    earlier-tool-result-placeholder: "${CONTEXT_COMPACT_EARLIER_TOOL_RESULT_PLACEHOLDER:[Earlier tool result compacted. Re-run if needed.]}"
    stored-tool-result-placeholder: "${CONTEXT_COMPACT_STORED_TOOL_RESULT_PLACEHOLDER:[Tool result stored locally: %s. Re-run or inspect the file if needed.]}"
  knowledge:
    top-k: ${RAG_TOP_K:4}
    chunk-size: ${KNOWLEDGE_CHUNK_SIZE:512}
    chunk-overlap: ${KNOWLEDGE_CHUNK_OVERLAP:64}
  chroma:
    enabled: ${CHROMA_ENABLED:true}
    base-url: ${CHROMA_BASE_URL:http://localhost:8000}
    knowledge-collection: ${CHROMA_COLLECTION:ticket-mind-knowledge}
    skill-collection: ${CHROMA_SKILL_COLLECTION:ticket-mind-skill}
    skill-root-path: ${CHROMA_SKILL_ROOT_PATH:core-module/src/main/resources/skills}
    skill-watch-enabled: ${CHROMA_SKILL_WATCH_ENABLED:true}
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:false}
    knowledge-upload-exchange: ${RABBITMQ_KNOWLEDGE_UPLOAD_EXCHANGE:ticket-mind.knowledge.exchange}
    knowledge-upload-queue: ${RABBITMQ_KNOWLEDGE_UPLOAD_QUEUE:ticket-mind.knowledge.uploaded.queue}
    knowledge-upload-routing-key: ${RABBITMQ_KNOWLEDGE_UPLOAD_ROUTING_KEY:knowledge.uploaded}
    todo-list-archive-exchange: ${RABBITMQ_TODO_LIST_ARCHIVE_EXCHANGE:ticket-mind.todo-list.exchange}
    todo-list-archive-queue: ${RABBITMQ_TODO_LIST_ARCHIVE_QUEUE:ticket-mind.todo-list.archived.queue}
    todo-list-archive-routing-key: ${RABBITMQ_TODO_LIST_ARCHIVE_ROUTING_KEY:todo-list.archived}
  mcp:
    enabled: ${MCP_ENABLED:false}
    sse-url: ${MCP_SSE_URL:}
    client-name: ${MCP_CLIENT_NAME:ticket-mind-core}
    client-version: ${MCP_CLIENT_VERSION:0.0.1-SNAPSHOT}
    protocol-version: ${MCP_PROTOCOL_VERSION:2024-11-05}
    timeout: ${MCP_TIMEOUT:60s}
    initialization-timeout: ${MCP_INITIALIZATION_TIMEOUT:30s}
    tool-execution-timeout: ${MCP_TOOL_EXECUTION_TIMEOUT:60s}
    resources-timeout: ${MCP_RESOURCES_TIMEOUT:60s}
    prompts-timeout: ${MCP_PROMPTS_TIMEOUT:60s}
    ping-timeout: ${MCP_PING_TIMEOUT:10s}
    reconnect-interval: ${MCP_RECONNECT_INTERVAL:5s}
    log-requests: ${MCP_LOG_REQUESTS:false}
    log-responses: ${MCP_LOG_RESPONSES:false}
  todo-list:
    active-ttl-hours: ${TODO_LIST_ACTIVE_TTL_HOURS:24}
    temp-archive-directory: ${TODO_LIST_TEMP_ARCHIVE_DIRECTORY:todo-list-archive}
